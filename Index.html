<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SipOrder - 響應式飲料訂購系統</title>
  
  <!-- 引入 Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* CSS 設計系統與變數 */
    :root {
      --bg-gradient: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0f1b 100%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: rgba(0, 0, 0, 0.3);
      --primary-gradient: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
      --accent-gradient: linear-gradient(135deg, #8a2be2 0%, #4a00e0 100%);
      --success-color: #00e676;
      --error-color: #ff1744;
      --text-main: #ffffff;
      --text-muted: #a0aec0;
      --font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景炫光裝飾 */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }
    body::before {
      background: #ff7e5f;
      top: 10%;
      left: 10%;
    }
    body::after {
      background: #8a2be2;
      bottom: 10%;
      right: 10%;
    }

    /* 容器 RWD */
    .container {
      width: 100%;
      max-width: 520px;
      z-index: 1;
      position: relative;
    }

    /* 頂部標題 */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      background: var(--primary-gradient);
      border-radius: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(255, 126, 95, 0.3);
      transform: rotate(-5deg);
      transition: var(--transition-smooth);
    }
    
    .logo-container:hover {
      transform: rotate(5deg) scale(1.05);
    }

    .logo-container i {
      font-size: 32px;
      color: #fff;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* 玻璃擬態主卡片 */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 20px 40px var(--glass-shadow);
      position: relative;
      overflow: hidden;
    }

    /* 表單項目 */
    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .input-control {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 16px;
      outline: none;
      transition: var(--transition-smooth);
    }

    .input-control:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #ff7e5f;
      box-shadow: 0 0 15px rgba(255, 126, 95, 0.15);
    }

    .input-control:focus + .input-icon {
      color: #ff7e5f;
    }

    /* 甜度與冰量選擇網格 */
    .segmented-control {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .ice-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .segment-option {
      position: relative;
    }

    .segment-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .segment-label {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 5px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: var(--transition-smooth);
      user-select: none;
    }

    .segment-option input[type="radio"]:checked + .segment-label {
      background: var(--primary-gradient);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(255, 126, 95, 0.2);
    }

    .segment-label:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    /* 數量步進器 (Stepper) */
    .stepper {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      width: fit-content;
      overflow: hidden;
    }

    .stepper-btn {
      background: transparent;
      border: none;
      color: var(--text-main);
      width: 50px;
      height: 50px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }

    .stepper-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #ff7e5f;
    }

    .stepper-input {
      width: 60px;
      height: 50px;
      border: none;
      background: transparent;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    /* 移除原生步進器箭頭 */
    .stepper-input::-webkit-outer-spin-button,
    .stepper-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* 表單按鈕列 */
    .form-btn-row {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .submit-btn, .print-action-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: var(--font-family);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition-smooth);
    }

    .submit-btn {
      background: var(--primary-gradient);
      box-shadow: 0 8px 25px rgba(255, 126, 95, 0.25);
    }

    .submit-btn:hover {
      box-shadow: 0 12px 30px rgba(255, 126, 95, 0.4);
      transform: translateY(-2px);
    }

    .print-action-btn {
      background: var(--accent-gradient);
      box-shadow: 0 8px 25px rgba(138, 43, 226, 0.25);
    }

    .print-action-btn:hover {
      box-shadow: 0 12px 30px rgba(138, 43, 226, 0.4);
      transform: translateY(-2px);
    }

    .submit-btn:active, .print-action-btn:active {
      transform: translateY(1px);
    }

    /* 狀態處理動畫與效果 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 27, 0.95);
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
      border-radius: 24px;
      padding: 30px 20px;
      text-align: center;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
      overflow-y: auto;
    }

    /* 載入中 Spinner */
    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ff7e5f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 成功 / 失敗狀態圖示 */
    .status-icon {
      font-size: 54px;
      margin-bottom: 15px;
      transform: scale(0.5);
      transition: var(--transition-smooth);
    }

    .overlay.active .status-icon {
      transform: scale(1);
    }

    .status-icon.success {
      color: var(--success-color);
      text-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
    }

    .status-icon.error {
      color: var(--error-color);
      text-shadow: 0 0 20px rgba(255, 23, 68, 0.4);
    }

    .status-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .status-desc {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 20px;
      max-width: 90%;
      line-height: 1.5;
    }

    /* 收據明細設計 */
    .receipt-card {
      width: 100%;
      max-width: 320px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .receipt-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .receipt-header h3 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
    }

    .receipt-header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .receipt-divider {
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      margin: 12px 0;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13.5px;
    }

    .receipt-row .label {
      color: var(--text-muted);
    }

    .receipt-row .val {
      color: var(--text-main);
      font-weight: 600;
    }

    .receipt-row .val.drink-name {
      color: #feb47b;
    }

    /* 按鈕容器 */
    .btn-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
      max-width: 320px;
    }

    .status-btn {
      flex: 1;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition-smooth);
    }

    .status-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #fff;
    }

    .status-btn.print-btn {
      background: var(--primary-gradient);
      border: none;
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 126, 95, 0.25);
    }

    .status-btn.print-btn:hover {
      box-shadow: 0 6px 20px rgba(255, 126, 95, 0.35);
      transform: translateY(-1px);
    }

    /* ==========================================================================
       列印專用 CSS 媒體查詢 (Print Styles)
       當呼叫 window.print() 時觸發，僅列印收據內容，隱藏其餘網頁介面。
       ========================================================================== */
    @media print {
      body {
        background: #ffffff !important;
        color: #000000 !important;
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        min-height: auto !important;
      }
      
      /* 隱藏外圍的漸層裝飾 */
      body::before, body::after {
        display: none !important;
      }

      /* 隱藏除了 statusOverlay 裡面的收據 (receipt-card) 之外的所有元素 */
      .container > :not(.card),
      .card > :not(#statusOverlay),
      #statusOverlay > :not(#receiptCard),
      .btn-container,
      #loadingSpinner,
      #statusIcon,
      #statusTitle,
      #statusDesc {
        display: none !important;
      }

      /* 移除定位限制，讓收據成為列印的主體 */
      #statusOverlay {
        position: static !important;
        background: transparent !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        padding: 0 !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
      }

      .card {
        border: none !important;
        background: transparent !important;
        box-shadow: none !important;
        padding: 0 !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      /* 列印版面樣式重置為白底黑字 */
      .receipt-card {
        max-width: 320px !important;
        border: 1px dashed #000000 !important;
        background: #ffffff !important;
        color: #000000 !important;
        box-shadow: none !important;
        padding: 15px !important;
        margin: 0 !important;
      }

      .receipt-header h3,
      .receipt-row .val,
      .receipt-row .val.drink-name {
        color: #000000 !important;
      }

      .receipt-row .label {
        color: #333333 !important;
      }

      .receipt-divider {
        border-top: 1px dashed #000000 !important;
      }

      /* 列印時隱藏今日訂購清單 */
      .list-card {
        display: none !important;
      }
    } 

    /* 表單標題區塊 */
    .form-header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--glass-border);
    }

    .form-header::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 3px;
      background: var(--primary-gradient);
      border-radius: 2px;
      z-index: 1;
    }

    .form-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
      margin-bottom: 0;
      display: inline-block;
    }

    .reset-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      transition: var(--transition-smooth);
    }

    .reset-btn:hover {
      background: rgba(255, 23, 68, 0.1);
      color: var(--error-color);
      transform: translateY(-50%) rotate(15deg);
    }
    }

    /* 訂購清單卡片 */
    .list-card {
      margin-top: 25px;
      padding: 25px 30px;
    }
    
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    
    .list-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      display: flex;
      align-items: center;
    }
    
    .toggle-icon {
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }
    
    .toggle-icon.rotate {
      transform: rotate(180deg);
    }
    
    .list-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    
    .list-content.active {
      max-height: 800px;
      margin-top: 20px;
      overflow: visible;
    }
    
    .loading-text, .no-data-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 20px 0;
    }
    
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .orders-table th, .orders-table td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .orders-table th {
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .orders-table td {
      color: var(--text-main);
    }
    
    .orders-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }
    
    .table-drink {
      font-weight: 600;
      color: #feb47b;
    }
    
    .delete-row-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    
    .delete-row-btn:hover {
      background: rgba(255, 23, 68, 0.1);
      color: var(--error-color);
      transform: scale(1.1);
    }



    /* RWD 手機版調整 */
    @media (max-width: 480px) {
      .card {
        padding: 25px 20px;
      }
      .segmented-control {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .segmented-control.sugar-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .segment-label {
        font-size: 12px;
        padding: 10px 2px;
      }
      .header h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- 頂部區塊 -->
    <div class="header">
      <div class="logo-container">
        <i class="fa-solid fa-mug-hot"></i>
      </div>
      <h1>SipOrder</h1>
      <p>現代化飲料線上點單系統 🍹</p>
    </div>

    <!-- 主表單卡片 -->
    <div class="card">
      
      <!-- 處理中 / 結果狀態覆蓋層 -->
      <div id="statusOverlay" class="overlay">
        <div id="loadingSpinner" class="spinner"></div>
        <div id="statusIcon" class="status-icon"></div>
        <div id="statusTitle" class="status-title">提交中...</div>
        <div id="statusDesc" class="status-desc">請稍候，阿芝正在幫您記錄訂單</div>
        
        <!-- 點單成功後要顯示的收據單 -->
        <div id="receiptCard" class="receipt-card" style="display: none;">
          <div class="receipt-header">
            <h3>SIPORDER 訂單收據</h3>
            <p id="receiptTime">2026/07/02 12:00:00</p>
          </div>
          <div class="receipt-divider"></div>
          <div class="receipt-row">
            <span class="label">訂購者</span>
            <span class="val" id="receiptBuyer">-</span>
          </div>
          <div class="receipt-row">
            <span class="label">飲料品項</span>
            <span class="val drink-name" id="receiptDrink">-</span>
          </div>
          <div class="receipt-row">
            <span class="label">甜度選擇</span>
            <span class="val" id="receiptSugar">-</span>
          </div>
          <div class="receipt-row">
            <span class="label">冰量選擇</span>
            <span class="val" id="receiptIce">-</span>
          </div>
          <div class="receipt-row">
            <span class="label">訂購數量</span>
            <span class="val" id="receiptQty">1 杯</span>
          </div>
          <div class="receipt-divider"></div>
          <div class="receipt-header" style="margin-bottom: 0;">
            <p>～謝謝您的點單，阿芝已為您記錄～</p>
          </div>
        </div>

        <!-- 操作按鈕 -->
        <div id="btnContainer" class="btn-container" style="display: none;">
          <button id="printBtn" class="status-btn print-btn" onclick="window.print()">
            <i class="fa-solid fa-print"></i>列印收據
          </button>
          <button id="closeOverlayBtn" class="status-btn" onclick="closeOverlay()">
            回表單
          </button>
        </div>
      </div>
      <form id="orderForm" onsubmit="handleFormSubmit(event)">
        <div class="form-header">
          <h2 class="form-title">飲料訂購單</h2>
          <button type="button" class="reset-btn" onclick="resetOrderForm()" title="清除表單">
            <i class="fa-solid fa-trash-can"></i>
          </button>
        </div>
        
        <!-- 第一項：訂購者 -->
        <div class="form-group">
          <label class="form-label" for="buyer">訂購者</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input 
              type="text" 
              id="buyer" 
              class="input-control" 
              placeholder="請輸入您的名字" 
              required
              autocomplete="name"
            >
          </div>
        </div>

        <!-- 第二項：飲料品項 -->
        <div class="form-group">
          <label class="form-label" for="drink">飲料品項</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-whiskey-glass input-icon"></i>
            <input 
              type="text" 
              id="drink" 
              class="input-control" 
              placeholder="請輸入飲料品項" 
              required
            >
          </div>
        </div>

        <!-- 第三項：甜度 -->
        <div class="form-group">
          <label class="form-label">甜度選擇</label>
          <div class="segmented-control sugar-grid">
            
            <div class="segment-option">
              <input type="radio" id="sugar_none" name="sugar" value="無糖">
              <label for="sugar_none" class="segment-label">無糖</label>
            </div>
            
            <div class="segment-option">
              <input type="radio" id="sugar_1" name="sugar" value="一分糖">
              <label for="sugar_1" class="segment-label">一分糖</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="sugar_3" name="sugar" value="三分糖">
              <label for="sugar_3" class="segment-label">三分糖</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="sugar_5" name="sugar" value="半糖" checked>
              <label for="sugar_5" class="segment-label">半糖</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="sugar_7" name="sugar" value="七分糖">
              <label for="sugar_7" class="segment-label">七分糖</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="sugar_10" name="sugar" value="全糖">
              <label for="sugar_10" class="segment-label">全糖</label>
            </div>

          </div>
        </div>

        <!-- 第四項：冰量 -->
        <div class="form-group">
          <label class="form-label">冰量選擇</label>
          <div class="segmented-control ice-grid">
            
            <div class="segment-option">
              <input type="radio" id="ice_none" name="ice" value="去冰">
              <label for="ice_none" class="segment-label">去冰</label>
            </div>
            
            <div class="segment-option">
              <input type="radio" id="ice_less" name="ice" value="少冰" checked>
              <label for="ice_less" class="segment-label">少冰</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="ice_more" name="ice" value="多冰">
              <label for="ice_more" class="segment-label">多冰</label>
            </div>

            <div class="segment-option">
              <input type="radio" id="ice_full" name="ice" value="全冰">
              <label for="ice_full" class="segment-label">全冰</label>
            </div>

          </div>
        </div>

        <!-- 第五項：數量 -->
        <div class="form-group">
          <label class="form-label" for="quantity">訂購數量</label>
          <div class="stepper">
            <button type="button" class="stepper-btn" onclick="adjustQuantity(-1)">
              <i class="fa-solid fa-minus"></i>
            </button>
            <input 
              type="number" 
              id="quantity" 
              class="stepper-input" 
              value="1" 
              min="1" 
              max="99"
              readonly
            >
            <button type="button" class="stepper-btn" onclick="adjustQuantity(1)">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>

        <!-- 提交與列印按鈕列 -->
        <div class="form-btn-row">
          <button type="submit" class="submit-btn">
            <span>送出訂單</span>
            <i class="fa-solid fa-paper-plane"></i>
          </button>
          <button type="button" class="print-action-btn" onclick="printCurrentOrder()">
            <span>列印點單</span>
            <i class="fa-solid fa-print"></i>
          </button>
        </div>

      </form>
    </div>

    <!-- 訂購清單卡片 -->
    <div class="card list-card" style="margin-top: 25px;">
      <div class="list-header" onclick="toggleOrderList()">
        <h2 class="list-title"><i class="fa-solid fa-list-check" style="margin-right: 8px;"></i>今日訂購清單</h2>
        <i id="listToggleIcon" class="fa-solid fa-chevron-down toggle-icon"></i>
      </div>
      <div id="orderListContainer" class="list-content active">
        <div id="ordersLoading" class="loading-text">
          <i class="fa-solid fa-circle-notch fa-spin"></i> 正在載入訂單...
        </div>
        <div id="noOrders" class="no-data-text" style="display: none;">
          目前還沒有人點單喔，快來當第一個點單的人吧！ ☕
        </div>
        <div id="ordersTableWrapper" style="display: none; overflow-x: auto;">
          <table class="orders-table">
            <thead>
              <tr>
                <th>訂購者</th>
                <th>品項</th>
                <th>甜度/冰量</th>
                <th>數量</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="ordersListBody">
              <!-- 動態生成 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 清除/重置表單內容
    function resetOrderForm() {
      if (confirm('確定要清除表單內容嗎？')) {
        document.getElementById('buyer').value = '';
        document.getElementById('drink').value = '';
        
        // 重置甜度為半糖 (預設)
        document.getElementById('sugar_5').checked = true;
        
        // 重置冰量為少冰 (預設)
        document.getElementById('ice_less').checked = true;
        
        // 重置數量為 1
        document.getElementById('quantity').value = '1';
      }
    }

    // 直接列印目前表單內容
    function printCurrentOrder() {
      const buyer = document.getElementById('buyer').value.trim();
      const drink = document.getElementById('drink').value.trim();
      const sugar = document.querySelector('input[name="sugar"]:checked').value;
      const ice = document.querySelector('input[name="ice"]:checked').value;
      const quantity = document.getElementById('quantity').value;

      if (!buyer || !drink) {
        alert('請先填寫訂購者與飲料品項後再進行列印！');
        return;
      }

      // 填充收據資料準備列印
      document.getElementById('receiptTime').textContent = getFormattedDate();
      document.getElementById('receiptBuyer').textContent = buyer;
      document.getElementById('receiptDrink').textContent = drink;
      document.getElementById('receiptSugar').textContent = sugar;
      document.getElementById('receiptIce').textContent = ice;
      document.getElementById('receiptQty').textContent = quantity + ' 杯';

      // 顯示收據遮罩並隱藏 spinner / status 圖示
      const overlay = document.getElementById('statusOverlay');
      const spinner = document.getElementById('loadingSpinner');
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusDesc = document.getElementById('statusDesc');
      
      const receiptCard = document.getElementById('receiptCard');
      const btnContainer = document.getElementById('btnContainer');

      overlay.classList.add('active');
      spinner.style.display = 'none';
      statusIcon.style.display = 'none';
      
      statusTitle.textContent = '列印收據明細';
      statusDesc.textContent = '阿芝已將點單資料帶入收據，您可以點選下方列印。';
      
      receiptCard.style.display = 'block';
      btnContainer.style.display = 'flex';

      // 延遲一下再呼叫列印，確保瀏覽器渲染完成
      setTimeout(function() {
        window.print();
      }, 300);
    }


    // 數量微調按鈕
    function adjustQuantity(amount) {
      const quantityInput = document.getElementById('quantity');
      let currentVal = parseInt(quantityInput.value, 10) || 1;
      currentVal += amount;
      if (currentVal < 1) currentVal = 1;
      if (currentVal > 99) currentVal = 99;
      quantityInput.value = currentVal;
    }

    // 格式化日期時間
    function getFormattedDate() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      return yyyy + '/' + mm + '/' + dd + ' ' + hh + ':' + min + ':' + ss;
    }

    // 關閉狀態遮罩
    function closeOverlay() {
      const overlay = document.getElementById('statusOverlay');
      overlay.classList.remove('active');
      
      // 重置或關閉按鈕與收據卡片
      setTimeout(() => {
        document.getElementById('btnContainer').style.display = 'none';
        document.getElementById('receiptCard').style.display = 'none';
        document.getElementById('loadingSpinner').style.display = 'block';
        document.getElementById('statusIcon').className = 'status-icon';
        document.getElementById('statusIcon').innerHTML = '';
      }, 300);
    }

    // 處理表單提交
    function handleFormSubmit(event) {
      event.preventDefault();

      // 讀取表單欄位
      const buyer = document.getElementById('buyer').value.trim();
      const drink = document.getElementById('drink').value.trim();
      const sugar = document.querySelector('input[name="sugar"]:checked').value;
      const ice = document.querySelector('input[name="ice"]:checked').value;
      const quantity = document.getElementById('quantity').value;

      if (!buyer || !drink) {
        alert('請填寫完整訂購資料！');
        return;
      }

      // 顯示提交中畫面
      const overlay = document.getElementById('statusOverlay');
      const spinner = document.getElementById('loadingSpinner');
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusDesc = document.getElementById('statusDesc');
      
      const receiptCard = document.getElementById('receiptCard');
      const btnContainer = document.getElementById('btnContainer');

      overlay.classList.add('active');
      spinner.style.display = 'block';
      statusIcon.style.display = 'none';
      receiptCard.style.display = 'none';
      btnContainer.style.display = 'none';
      
      statusTitle.textContent = '訂單提交中...';
      statusDesc.textContent = '阿芝正在與 Google 試算表連線，請稍候。';

      // 填充收據資料準備列印
      document.getElementById('receiptTime').textContent = getFormattedDate();
      document.getElementById('receiptBuyer').textContent = buyer;
      document.getElementById('receiptDrink').textContent = drink;
      document.getElementById('receiptSugar').textContent = sugar;
      document.getElementById('receiptIce').textContent = ice;
      document.getElementById('receiptQty').textContent = quantity + ' 杯';

      // 訂單資料封裝
      const orderData = {
        buyer: buyer,
        drink: drink,
        sugar: sugar,
        ice: ice,
        quantity: quantity
      };

      // 判斷是否在 Google Apps Script 環境中運行
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            spinner.style.display = 'none';
            statusIcon.style.display = 'block';
            
            if (response && response.success) {
              // 成功狀態
              statusIcon.className = 'status-icon success';
              statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
              statusTitle.textContent = '點單成功！';
              statusDesc.textContent = response.message || '阿芝已經幫您記錄在試算表中。';
              
              // 顯示收據
              receiptCard.style.display = 'block';
              
              // 成功後重置表單（但保留訂購者名字方便下一次點單）
              document.getElementById('drink').value = '';
              document.getElementById('quantity').value = '1';
              
              // 提交成功後即時重新整理下方點單清單
              fetchOrders();
            } else {
              // 失敗狀態 (Apps Script 回傳 success: false)
              statusIcon.className = 'status-icon error';
              statusIcon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
              statusTitle.textContent = '提交失敗';
              statusDesc.textContent = response.message || '請聯絡系統管理員確認試算表權限。';
            }
            btnContainer.style.display = 'flex';
          })
          .withFailureHandler(function(error) {
            // Apps Script 調用崩潰 (如函數不存在等)
            spinner.style.display = 'none';
            statusIcon.style.display = 'block';
            statusIcon.className = 'status-icon error';
            statusIcon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
            statusTitle.textContent = '系統錯誤';
            statusDesc.textContent = '無法連線至 Google 服務，請確認您的部署連結。' + (error ? ' (' + error.toString() + ')' : '');
            btnContainer.style.display = 'flex';
          })
          .submitOrder(orderData);
      } else {
        // 本地預覽開發環境 (模擬發送)
        console.log('Detected local preview environment. Simulating request:', orderData);
        setTimeout(function() {
          spinner.style.display = 'none';
          statusIcon.style.display = 'block';
          statusIcon.className = 'status-icon success';
          statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
          statusTitle.textContent = '本地開發預覽模式';
          statusDesc.textContent = '模擬提交成功！(此環境無實體 Google Sheets，但運作正常。)\n' +
            '點單完成後您可以在下方點選列印此單收據。';
          
          // 顯示收據
          receiptCard.style.display = 'block';
          btnContainer.style.display = 'flex';
          
          // 模擬重置
          document.getElementById('drink').value = '';
          document.getElementById('quantity').value = '1';
          
          // 模擬提交成功後重新整理清單
          fetchOrders();
        }, 1500);
      }
    }

    // 頁面載入完成後自動拉取今日訂單清單
    window.addEventListener('DOMContentLoaded', (event) => {
      fetchOrders();
    });

    // 儲存本地模擬點單的暫存陣列 (方便本地預覽時能測試完整增刪功能)
    let localMockOrders = [
      { rowIndex: 2, timestamp: '2026/07/02 23:56:42', buyer: 'coco', drink: '烏龍綠茶', sugar: '全糖', ice: '全冰', quantity: 2, status: '待處理' },
      { rowIndex: 3, timestamp: '2026/07/03 00:05:12', buyer: '阿芝', drink: '四季春茶', sugar: '無糖', ice: '去冰', quantity: 1, status: '待處理' }
    ];

    // 取得並載入訂單清單
    function fetchOrders() {
      const loading = document.getElementById('ordersLoading');
      const noOrders = document.getElementById('noOrders');
      const tableWrapper = document.getElementById('ordersTableWrapper');
      
      loading.style.display = 'block';
      noOrders.style.display = 'none';
      tableWrapper.style.display = 'none';

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(renderOrders)
          .withFailureHandler(function(err) {
            loading.style.display = 'none';
            noOrders.textContent = '載入點單清單失敗，請確認部署設定。';
            noOrders.style.display = 'block';
          })
          .getOrders();
      } else {
        // 本地預覽開發環境：使用模擬資料
        setTimeout(() => {
          renderOrders(localMockOrders);
        }, 800);
      }
    }

    // 將資料渲染至 HTML 表格中
    function renderOrders(orders) {
      const loading = document.getElementById('ordersLoading');
      const noOrders = document.getElementById('noOrders');
      const tableWrapper = document.getElementById('ordersTableWrapper');
      const listBody = document.getElementById('ordersListBody');
      
      loading.style.display = 'none';
      listBody.innerHTML = '';

      if (!orders || orders.length === 0) {
        noOrders.style.display = 'block';
        tableWrapper.style.display = 'none';
        return;
      }

      noOrders.style.display = 'none';
      tableWrapper.style.display = 'block';

      orders.forEach(order => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(order.buyer)}</td>
          <td><span class="table-drink">${escapeHtml(order.drink)}</span></td>
          <td>${order.sugar} / ${order.ice}</td>
          <td><strong>${order.quantity}</strong> 杯</td>
          <td>
            <button type="button" class="delete-row-btn" onclick="deleteTargetOrder(${order.rowIndex}, '${escapeHtml(order.buyer)}', '${escapeHtml(order.drink)}')" title="刪除此筆訂單">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </td>
        `;
        listBody.appendChild(tr);
      });
    }

    // HTML 逸出安全防護 (防範 XSS)
    function escapeHtml(string) {
      return String(string).replace(/[&<>"']/g, function (s) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': '&quot;',
          "'": '&#39;'
        }[s];
      });
    }

    // 摺疊 / 展開訂購清單卡片
    function toggleOrderList() {
      const content = document.getElementById('orderListContainer');
      const icon = document.getElementById('listToggleIcon');
      content.classList.toggle('active');
      icon.classList.toggle('rotate');
    }

    // 呼叫後端刪除指定行數訂單
    function deleteTargetOrder(rowIndex, buyer, drink) {
      if (!confirm(`確定要刪除「${buyer}」的「${drink}」訂單嗎？\n此動作將會從 Google 試算表中永久移除該列資料！`)) {
        return;
      }
      
      // 顯示加載中覆蓋層
      const overlay = document.getElementById('statusOverlay');
      const spinner = document.getElementById('loadingSpinner');
      const statusIcon = document.getElementById('statusIcon');
      const statusTitle = document.getElementById('statusTitle');
      const statusDesc = document.getElementById('statusDesc');
      const btnContainer = document.getElementById('btnContainer');
      const receiptCard = document.getElementById('receiptCard');

      overlay.classList.add('active');
      spinner.style.display = 'block';
      statusIcon.style.display = 'none';
      receiptCard.style.display = 'none';
      btnContainer.style.display = 'none';
      
      statusTitle.textContent = '訂單刪除中...';
      statusDesc.textContent = `正在將 ${buyer} 的點單資料從 Google Sheets 中移除，請稍候。`;

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            spinner.style.display = 'none';
            statusIcon.style.display = 'block';
            
            if (response && response.success) {
              statusIcon.className = 'status-icon success';
              statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
              statusTitle.textContent = '刪除成功！';
              statusDesc.textContent = response.message;
              
              // 重新載入列表
              fetchOrders();
            } else {
              statusIcon.className = 'status-icon error';
              statusIcon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
              statusTitle.textContent = '刪除失敗';
              statusDesc.textContent = response.message || '無法刪除指定行數。';
            }
            btnContainer.style.display = 'flex';
          })
          .withFailureHandler(function(error) {
            spinner.style.display = 'none';
            statusIcon.style.display = 'block';
            statusIcon.className = 'status-icon error';
            statusIcon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
            statusTitle.textContent = '系統錯誤';
            statusDesc.textContent = '刪除呼叫失敗，請確認您的部署連結。' + (error ? ' (' + error.toString() + ')' : '');
            btnContainer.style.display = 'flex';
          })
          .deleteOrder(rowIndex);
      } else {
        // 本地模擬刪除邏輯 (並在模擬陣列中刪除對應 rowIndex)
        setTimeout(() => {
          spinner.style.display = 'none';
          statusIcon.style.display = 'block';
          statusIcon.className = 'status-icon success';
          statusIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
          statusTitle.textContent = '本地模擬刪除成功';
          statusDesc.textContent = `成功刪除 ${buyer} 點的 ${drink} 訂單！(本地模擬資料更新中)`;
          
          btnContainer.style.display = 'flex';
          
          // 在暫存模擬中過濾掉該 rowIndex
          localMockOrders = localMockOrders.filter(order => order.rowIndex !== rowIndex);
          
          // 重新載入
          fetchOrders();
        }, 1200);
      }
    }
  </script>

</body>
</html>
